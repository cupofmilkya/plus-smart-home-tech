server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.kafka.serialization.CustomSensorEventSerializer
      properties:
        enable-idempotence: false
        acks: all

logging:
  level:
    root: INFO
    ru.practicum: DEBUG
    ru.practicum.kafka.serialization: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: INFO

grpc:
  server:
    port: 59091